services:

  backend:

    build: ./backend

    container_name: eaas-showcase-backend

    ports:

      - "8001:8001"

    restart: unless-stopped

  frontend:

    build: ./frontend

    container_name: eaas-showcase-frontend

    ports:

      - "8080:8080"

    depends_on:

      - backend

    restart: unless-stopped
